<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Treinando Tabela</title>
  <style>
    table {
      border-width: 2px;
      border-style: double;
      background-color: chartreuse;
    }

    td {
      border-width: 2px;
      border-style: solid;
      background-color: white;

    }

    .coluna1 {
      border-width: 1px;
      border-style: solid;
      background-color: white;
    }

    .l {
      border-width: 2px;
      border-style: solid;
      background-color: white;
    }

    /* td.unico {
      border-width: 20px;
    } */
  </style>
</head>

<body>
  <table>
    <thead></thead>
    <tbody></tbody>
    <!-- <tr>
      <th colspan=2>Desenvolvimento Web</th>
    </tr> -->
    <tr>
      <th class="l">Aluno</th>
      <th class="l">Unidade 1</th>
      <th class="l">Unidade 2</th>
    </tr>
    <tr>
      <td class="l">Alfred Pennyworth</td>
      <td class="l">7,5</td>
      <td class="l">7,0</td>
    </tr>
    <tr>
      <td class="l">Damian Wayne</td>
      <td class="l">8,0</td>
      <td class="l">7,5</td>
    </tr>
    <tr>
      <td class="l">Dick Grayson</td>
      <td class="l">10</td>
      <td class="l">9,0</td>
    </tr>
    <tr>
      <td class="l">Tim Drake</td>
      <td class="l">9,0</td>
      <td class="l">8,5</td>
    </tr>
  </table>
</body>

</html>
