<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <title>Jogos</title>
  <link rel="stylesheet" href="../Jogos_Iframe/estilo/style.css">

  <script>
    var paginas = [
      '../Jogos_iframe/paginas/nfsmw.html',
      '../Jogos_iframe/paginas/agemit.html',
      '../Jogos_iframe/paginas/gtavc.html',
      '../Jogos_iframe/paginas/killzone.html',
      '../Jogos_iframe/paginas/maxpayne.html',
      '../Jogos_iframe/paginas/nfscb.html',
      '../Jogos_iframe/paginas/resident.html',
      '../Jogos_iframe/paginas/warcraft.html',
      '../Jogos_iframe/paginas/gtasa.html',
      '../Jogos_iframe/paginas/halo.html'
    ];

    var indexAtual = 0;
    var timer;

    function atualizarIframe() {
      document.getElementById('meuIframe').src = paginas[indexAtual];
    }

    function iniciarTimer() {
      clearInterval(timer);
      timer = setInterval(frente, 4000);
    }

    function frente() {
      indexAtual++;
      if (indexAtual >= paginas.length) {
        indexAtual = 0;
      }
      atualizarIframe();
      iniciarTimer();
    }

    function atras() {
      indexAtual--;
      if (indexAtual < 0) {
        indexAtual = paginas.length - 1;
      }
      atualizarIframe();
      iniciarTimer();
    }

    iniciarTimer();
  </script>
</head>

<body class="body-index">
  <table>
    <tr>
      <th>Iframe</th>
    </tr>
    <tr>
      <td class="data">
        <span>
          <script>
            var data = new Date();
            var dias_semana = ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"];
            var meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            document.write(dias_semana[data.getDay()] + ", " + data.getDate() + " de " + meses[data.getMonth()] + " de " + data.getFullYear());
          </script>
        </span>
      </td>
    </tr>
    <tr>
      <td class="divisao">
        <iframe id="meuIframe" src="../Jogos_iframe/paginas/maxpayne.html" scrolling="no"></iframe>
      </td>
    </tr>
    <tr>
      <td class="controles">
        <button class="botao" onClick="atras()"><< Anterior</button>
        <button class="botao" onClick="frente()">Próximo >></button>
      </td>
    </tr>
  </table>
</body>

</html>
